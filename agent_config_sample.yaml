# Ambivo Agents v2.0.0 - Sample Configuration
# agent_config_sample.yaml
#
# INSTRUCTIONS:
# 1. Copy this file to agent_config.yaml
# 2. Replace placeholder values with your actual credentials
# 3. Remove or comment out sections for services you don't use

# ================================
# LLM Configuration (required)
# ================================
llm:
  preferred_provider: anthropic  # openai | anthropic
  temperature: 0.5
  max_tokens: 4000

  # At least one API key required
  openai_api_key: "your-openai-api-key"
  anthropic_api_key: "your-anthropic-api-key"

  # Optional: AWS Bedrock
  aws_access_key_id: ""
  aws_secret_access_key: ""
  aws_region: "us-east-1"

# ================================
# Agent Capabilities
# ================================
agent_capabilities:
  enable_knowledge_base: false  # requires Qdrant
  enable_web_search: true
  enable_web_scraping: true
  enable_gather: true

# ================================
# Web Search
# ================================
web_search:
  brave_api_key: "your-brave-api-key"
  avesapi_api_key: ""
  default_max_results: 10

# ================================
# Web Scraping (API-based, no Docker/Playwright)
# ================================
web_scraping:
  timeout: 60
  rate_limit_seconds: 1.0

  scraping:
    provider: "jina"  # jina | firecrawl | requests
    jina_api_key: ""  # optional, free tier works without key
    firecrawl_api_key: ""  # required if using firecrawl

  default_headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# ================================
# Knowledge Base (optional - requires Qdrant)
# ================================
knowledge_base:
  qdrant_url: "https://your-cluster.qdrant.tech:6333"
  qdrant_api_key: "your-qdrant-api-key"
  vector_size: 1536
  distance_metric: "cosine"
  similarity_top_k: 5
  chunk_size: 1024
  chunk_overlap: 20
  default_collection_prefix: ""

# ================================
# Redis (optional - in-memory is default)
# ================================
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""

# ================================
# Moderator Agent
# ================================
moderator:
  default_enabled_agents:
    - knowledge_base
    - knowledge_synthesis
    - web_search
    - web_scraper
    - assistant

  routing:
    confidence_threshold: 0.6
    fallback_agent: "assistant"

# ================================
# Gather Agent (conversational forms)
# ================================
gather:
  submission_endpoint: "https://your-api.example.com/submit"
  submission_method: "POST"
  submission_headers:
    Content-Type: "application/json"
  memory_ttl_seconds: 3600
  enable_llm_answer_validation: false

# ================================
# Service
# ================================
service:
  log_level: INFO
  max_sessions: 100
  session_timeout: 3600
